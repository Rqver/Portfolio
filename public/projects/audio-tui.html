<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Audio TUI | Hunter Y</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=block" rel="stylesheet">

    <link href="/css/tailwind.css" rel="stylesheet">
    <link href="/css/scrollbar.css" rel="stylesheet">

    <link href="/css/swap.css" rel="stylesheet">
    <script src="/js/swap.js"></script>
</head>
<body class="font-jetbrains-mono bg-ctp-base text-ctp-text">

<main id="page-content">
    <link rel="stylesheet" href="https://unpkg.com/embla-carousel/embla-carousel.min.css">
    <script src="https://unpkg.com/embla-carousel/embla-carousel.umd.js"></script>
    <div class="min-h-screen">
        <div class="md:ml-[10vw] ml-0 flex flex-col">
            <section class="w-full max-w-6xl px-6 pt-6 md:pt-16 text-left">
                <a href="/" class="group inline-flex items-center gap-2 text-ctp-subtext1 hover:text-ctp-teal transition-colors mb-8 text-sm select-none">
                    <span class="inline-block transition-transform group-hover:-translate-x-1">←</span>
                    Back to Projects
                </a>

                <div class="flex flex-col md:flex-row md:items-end justify-between gap-6">

                    <div class="max-w-2xl">
                        <h1 class="text-4xl font-bold text-ctp-teal mb-2 selection:bg-ctp-teal/30">Audio TUI</h1>
                        <p class="text-ctp-subtext0 selection:bg-ctp-sapphire/30">A TUI to manage playback of radio streams and Plexamp playlists.</p>
                    </div>

                    <div class="flex flex-row md:flex-col gap-x-5 gap-y-1 md:text-right shrink-0 select-none">
                        <a href="https://github.com/Rqver/AudioTUI" target="_blank" class="group inline-flex items-center md:justify-end gap-1 text-ctp-subtext1 hover:text-ctp-teal transition-colors text-sm">
                            <span>Source Code</span>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-3.5 h-3.5 transition-transform duration-300 group-hover:-translate-y-0.5 group-hover:translate-x-0.5">
                                <line x1="7" y1="17" x2="17" y2="7"></line>
                                <polyline points="7 7 17 7 17 17"></polyline>
                            </svg>
                        </a>
                    </div>
                </div>
            </section>
        </div>

        <section class="w-full py-12">
            <div class="embla overflow-hidden opacity-0 transition-opacity duration-280 select-none">
                <div class="embla__container flex touch-pan-y pr-4 md:pr-8">
                    <div class="embla__slide flex-none w-[90vw] md:w-[900px] min-w-0 pl-4 md:pl-8">
                        <div class="relative aspect-video shadow-xl">
                            <img class="absolute inset-0 w-full h-full object-cover object-left opacity-0 transition-opacity duration-280" src="/img/audio-tui/img.png">
                        </div>
                    </div>
                </div>
            </div>
        </section>

    </div>

    <script>
        {
            const initEmbla = () => {
                const emblaNode = document.querySelector('.embla');
                if (typeof EmblaCarousel !== 'undefined' && emblaNode) {
                    const emblaApi = EmblaCarousel(emblaNode, { loop: true, dragFree: true, draggable: true });

                    requestAnimationFrame(() => {
                        emblaNode.classList.remove('opacity-0');
                        emblaNode.classList.add('opacity-100');

                        emblaApi.reInit();
                    });

                } else {
                    setTimeout(initEmbla, 50);
                }
            };

            initEmbla();
        }
    </script>
</main>
<footer class="mt-24 px-6 pb-8 text-sm text-ctp-subtext1 text-center relative selection:bg-ctp-sapphire/30">
    <div class="max-w-2xl mx-auto">
        © <span id="currentYear"></span> Hunter Y
    </div>
    <button id="backToTop" class="absolute right-6 bottom-6 text-ctp-subtext1 p-3 transition transform hover:-translate-y-1 cursor-pointer select-none">
        ↑ Top
    </button>
</footer>
<script src="/js/preload.js"></script>
<script src="/js/images.js"></script>
<script src="/js/footer.js"></script>
</body>
</html>
